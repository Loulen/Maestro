name: review-loop
version: "1.0"

nodes:
  - id: XBG5Cxkn
    name: implementer
    type: code-mutating
    inputs:
      - name: review
    outputs:
      - name: code
    view: { x: 100, y: 160 }

  - id: Qws9KzRZ
    name: reviewer
    type: doc-only
    inputs:
      - name: code
    outputs:
      - name: review
    view: { x: 500, y: 160 }

edges:
  # Forward: implementer → reviewer (unconditional)
  - source: { node: XBG5Cxkn, port: code }
    target: { node: Qws9KzRZ, port: code }

  # Back-edge: reviewer → implementer while iter < 3
  - source: { node: Qws9KzRZ, port: review }
    target: { node: XBG5Cxkn, port: review }
    when:
      iter: { lt: 3 }

  # Halt when the cycle has run 3 iterations
  - source: { node: Qws9KzRZ, port: review }
    target: { halt: { message: "Review loop completed after {iter} iterations on {node-id}" } }
    when:
      iter: { gte: 3 }
